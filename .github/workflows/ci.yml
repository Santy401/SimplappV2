name: CI - Simplapp V2

on:
  push:
    branches: [main, master, "feature/**", "fix/**", "feat/**", "refactor/**"]
  pull_request:
    branches: [main, master, "feature/**", "fix/**", "feat/**", "refactor/**"]
  workflow_dispatch:

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_ROOT_DOMAIN: ${{ secrets.NEXT_PUBLIC_ROOT_DOMAIN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Explicitly approve prisma build scripts so the .prisma/client/
      # directory with all generated types gets created during install.
      # Without this step, pnpm blocks prisma's postinstall and
      # types like PrismaClient, BankAccountType, etc never exist in CI.
      - name: Approve Prisma build scripts
        run: pnpm approve-builds -f

      # Regenerate Prisma Client after approving builds to ensure
      # all workspace instances have the generated types.
      - name: Prisma Generate
        working-directory: ./apps/web
        run: pnpm exec prisma generate

      - name: Build
        run: pnpm build

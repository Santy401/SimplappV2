name: CI - Simplapp V2

on:
  push:
    branches: [main, master, "feature/**", "fix/**", "feat/**", "refactor/**"]
  pull_request:
    branches: [main, master, "feature/**", "fix/**", "feat/**", "refactor/**"]
  workflow_dispatch:

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest

    env:
      # Dummy values for CI/CD build phase
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/simplapp' }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-dummy-secret-at-least-32-chars-long' }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'ci-dummy-refresh-secret-at-least-32-chars-long' }}
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_ROOT_DOMAIN: ${{ secrets.NEXT_PUBLIC_ROOT_DOMAIN || 'localhost:3000' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  docker-build:
    name: Docker Build Check
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: simplapp-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

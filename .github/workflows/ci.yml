name: CI - Simplapp V2

on:
  push:
    branches: [main, master, "feature/**", "fix/**", "feat/**", "refactor/**"]
  pull_request:
    branches: [main, master, "feature/**", "fix/**", "feat/**", "refactor/**"]
  workflow_dispatch:

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_ROOT_DOMAIN: ${{ secrets.NEXT_PUBLIC_ROOT_DOMAIN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma v7 generates typed client code at build time.
      # We must run generate for EVERY workspace that has @prisma/client
      # so each workspace's resolved instance gets the generated types.
      # apps/web has the schema, interfaces/lib/prisma.ts imports the client.
      - name: Prisma Generate (apps/web)
        working-directory: ./apps/web
        run: pnpm exec prisma generate

      - name: Build
        run: pnpm build

      # - name: Lint
      #   run: pnpm lint

      # - name: Test
      #   run: pnpm test

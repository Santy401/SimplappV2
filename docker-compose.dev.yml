version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: simplapp-db-dev
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-simplapp}
    ports:
      - "5432:5432" # Changed to 5432 to be the default PG port
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: simplapp-web-dev
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-simplapp}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-at-least-32-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-key-at-least-32-chars}
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-localhost:3000}
      PORT: 3000
    volumes:
      - .:/app
      # Ignorar carpetas locales compiladas para que el contenedor use versiones de Linux Alpine
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
      - /app/packages/domain/node_modules
      - /app/packages/interfaces/node_modules
      - /app/packages/ui/node_modules
    depends_on:
      - db
    # Instalar dependencias puras para Alpine y arrancar el dev server del Monorepo
    command: sh -c "pnpm install && pnpm dev"

volumes:
  postgres_data:
